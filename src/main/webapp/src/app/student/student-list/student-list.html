<div class="table-responsive">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h3 class="fw-bold m-0">Student Records</h3>
		<span class="badge bg-beige text-dark border px-3 py-2 rounded-pill">
			{{studentService.students().length}} Enrolled
		</span>
	</div>
	
	<table class="table table-hover align-middle">
		<thead>
			<tr>
				<th class="border-0 bg-transparent text-secondary small fw-bold text-uppercase pb-3">Name</th>
				<th class="border-0 bg-transparent text-secondary small fw-bold text-uppercase pb-3">Age</th>
				<th class="border-0 bg-transparent text-secondary small fw-bold text-uppercase pb-3 text-end">Actions</th>
			</tr>
		</thead>
		<tbody>
			@for (student of studentService.students(); track student.id) {
			<tr>
				<td class="py-3 fw-semibold">{{student.name}}</td>
				<td class="py-3">{{student.age}} years</td>
				<td class="py-3 text-end">
					<button class="btn btn-sm btn-outline-danger border-0 rounded-pill px-3" 
							(click)="deleteStudent(student.id)">
						<span class="small fw-bold">Remove</span>
					</button>
				</td>
			</tr>
			} @empty {
			<tr>
				<td colspan="3" class="text-center py-5 text-muted italic">
					No student records found. Add one to get started.
				</td>
			</tr>
			}
		</tbody>
	</table>
</div>
