<h3>Student List</h3>
<table>
	<tr>
		<th>Name</th>
		<th>Age</th>
	</tr>
	@for (student of studentService.students(); track student.id){
	<tr>
		<td>{{student.name}}</td>
		<td>{{student.age}}</td>
		<button class="btn btn-success" (click)="deleteStudent(student.id)">Delete</button>
	</tr>
	}
</table>
<!--The @for is similar to our th:each tags.  -->
<!-- It is reading the studentService tag in your ts file -->
